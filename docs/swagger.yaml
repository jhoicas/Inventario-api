            $ref: '#/definitions/dto.MarginsReportDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: Reporte de márgenes por canal y ranking de SKUs (Pareto 80/20)
      tags:
      - analytics
  /api/analytics/raw-materials-impact:
    get:
      description: Devuelve el ranking de materias primas por peso financiero en productos
        vendidos en el período (BOM + coste).
