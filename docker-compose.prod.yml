# Compose de producción: solo la API. PostgreSQL es servicio administrado externo.
# Uso: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  erp-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-api:latest
    container_name: erp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - GO_ENV=production
    volumes:
      - ./certs:/app/certs:ro
