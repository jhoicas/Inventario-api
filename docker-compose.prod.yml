services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-api:latest
    container_name: erp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - GO_ENV=production

  caddy:
    image: caddy:2-alpine
    container_name: erp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  ludoia-web:
    image: invorya-erp-ludoia-web
    container_name: invorya-erp-ludoia-web-1
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  caddy_data:
  caddy_config:
